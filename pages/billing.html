<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Billing | Student Essentials</title>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/billing.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="../index.html" class="logo">📚 StudentEssentials</a>
        <a href="dashboard.html" class="dashboard-link">Dashboard</a>
      </div>
    </nav>

    <div class="billing-wrapper">
      <div class="billing-card">
        <h2>Billing Summary</h2>
        <div id="billingItems" class="billing-items"></div>
        <div class="billing-total">
          <strong>Total Amount: ₹<span id="billingTotal">0</span></strong>
        </div>
        <form id="billingForm">
          <label>Card Number</label>
          <input type="text" placeholder="1234 5678 9012 3456" required />

          <label>Expiry Date</label>
          <input type="month" required />

          <label>CVV</label>
          <input type="password" maxlength="3" required />

          <button type="submit" class="btn-primary">Pay Now</button>
        </form>
      </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/billing.js"></script>
  </body>
</html>
