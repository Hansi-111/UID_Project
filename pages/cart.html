<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart | Student Essentials</title>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/cart.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="../index.html" class="logo">📚 StudentEssentials</a>
        <a href="dashboard.html" class="dashboard-link">My Dashboard</a>
      </div>
    </nav>

    <div class="cart-container">
      <h2>Your Cart</h2>
      <div id="cartItemsList" class="cart-items"></div>
      <div class="cart-summary">
        <h3>Total: ₹<span id="cartTotal">0</span></h3>
        <button id="checkoutBtn" class="btn-primary">Proceed to Billing</button>
      </div>
      <button id="continueShopping" class="btn-secondary">
        Continue Shopping
      </button>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/cart.js"></script>
  </body>
</html>
